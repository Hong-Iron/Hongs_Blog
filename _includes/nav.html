<header class="site-header">
  <div class="container site-header__inner">
    <a class="site-logo" href="{{ '/' | relative_url }}">Hong<em>-</em>Iron</a>
    <nav class="site-nav" aria-label="Primary">
      <ul>
        <li><a href="{{ '/projects/' | relative_url }}"{% if page.url contains '/projects/' %} aria-current="page"{% endif %}>Projects</a></li>
        {% for cat in site.data.categories %}
          {% if cat.group == "writing" %}
            <li><a href="{{ '/' | append: cat.slug | append: '/' | relative_url }}"{% if page.category == cat.slug %} aria-current="page"{% endif %}>{{ cat.name }}</a></li>
          {% endif %}
        {% endfor %}
        <li><a href="{{ '/about/' | relative_url }}"{% if page.url == '/about/' %} aria-current="page"{% endif %}>About</a></li>
      </ul>
    </nav>
  </div>
</header>
