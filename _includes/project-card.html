{% assign project = include.project %}
<a class="card reveal" href="{{ project.url | relative_url }}">
  <div class="card__media{% unless project.cover %} card__media--empty{% endunless %}">
    {% if project.cover %}
      <img src="{{ project.cover | relative_url }}" alt="" loading="lazy">
    {% else %}
      <span>{{ project.title | slice: 0, 1 }}</span>
    {% endif %}
  </div>
  <span class="card__eyebrow tag" style="--tag-color: var(--accent-rust)">{{ project.status | default: "Project" }}</span>
  <h3 class="card__title">{{ project.title }}</h3>
  <p class="card__desc">{{ project.summary }}</p>
</a>
