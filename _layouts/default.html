<!DOCTYPE html>
<html lang="en">
<head>
{% include head.html %}
</head>
<body
  data-bg="{{ site.data.theme.background | default: 'paper-cream' }}"
  data-fx-grain="{{ site.data.theme.effects.grain }}"
  data-fx-reveal="{{ site.data.theme.effects.scroll_reveal }}"
  data-fx-underline="{{ site.data.theme.effects.link_underline_draw }}"
>
  <div class="grain-overlay" aria-hidden="true"></div>

  {% if site.data.theme.effects.dismissible_banner != false %}
    {% include notification-banner.html %}
  {% endif %}

  {% include nav.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/effects.js' | relative_url }}" defer></script>
  <script src="{{ '/assets/js/notifications.js' | relative_url }}" defer></script>
</body>
</html>
